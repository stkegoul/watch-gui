name: release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            archive_ext: tar.gz
            binary_name: blnk-watch
          - runner: macos-14
            goos: darwin
            goarch: arm64
            archive_ext: tar.gz
            binary_name: blnk-watch

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME} -X main.commit=${GITHUB_SHA::7} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/${{ matrix.binary_name }}" \
            ./cmd/blnk-watch

      - name: Package archive (Unix)
        shell: bash
        run: |
          asset="blnk-watch_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}"
          tar -C dist -czf "dist/${asset}" "${{ matrix.binary_name }}"
          shasum -a 256 "dist/${asset}" | awk -v name="${asset}" '{print $1 "  " name}' > "dist/${asset}.sha256"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: blnk-watch-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" --repo "${GH_REPO}" --generate-notes
          fi

          find dist -type f -exec gh release upload "${GITHUB_REF_NAME}" --repo "${GH_REPO}" {} --clobber \;
